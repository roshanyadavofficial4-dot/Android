name: Build A.R.Y.A. OS APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      - name: Install Missing C-Compilers (Autoconf/Automake/Libtool)
        run: sudo apt-get update && sudo apt-get install -y autoconf automake libtool pkg-config

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install --user buildozer cython==0.29.33 virtualenv
        sudo apt-get update
        sudo apt-get install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libncurses-dev cmake libffi-dev libssl-dev
        echo "$HOME/.local/bin" >> $GITHUB_PATH

    - name: Build with Buildozer
      run: |
        buildozer android debug
      env:
        BUILDOZER_ALLOW_ORG_NAME_AS_PACKAGE_NAME: 1

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: arya-os-debug-apk
        path: bin/*.apk
